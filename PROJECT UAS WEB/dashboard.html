<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#ffe16d", "on-error-container": "#93000a", "on-primary-fixed": "#221b00", "secondary-container": "#e4e2e1", "surface-dim": "#dadada", "tertiary-fixed": "#79f5ff", "on-primary": "#ffffff", surface: "#f9f9f9", outline: "#7e775f", background: "#f9f9f9", "on-tertiary-container": "#006a70", "secondary-fixed": "#e4e2e1", "on-secondary-fixed": "#1b1c1c", secondary: "#5f5e5e", "outline-variant": "#d0c6ab", "on-primary-fixed-variant": "#544600", "surface-container-lowest": "#ffffff", "error-container": "#ffdad6", "on-surface": "#1a1c1c", "surface-bright": "#f9f9f9", primary: "#705d00", error: "#ba1a1a", "on-secondary": "#ffffff", "surface-container-high": "#e8e8e8", "surface-tint": "#705d00", "primary-fixed-dim": "#e9c400", "secondary-fixed-dim": "#c8c6c6", "surface-container-low": "#f3f3f3", "on-tertiary-fixed-variant": "#004f54", "surface-variant": "#e2e2e2", "on-background": "#1a1c1c", "on-secondary-container": "#656464", "on-secondary-fixed-variant": "#474747", "inverse-primary": "#e9c400", "on-primary-container": "#705e00", "surface-container": "#eeeeee", "surface-container-highest": "#e2e2e2", "on-error": "#ffffff", "inverse-on-surface": "#f1f1f1", "inverse-surface": "#2f3131", "on-surface-variant": "#4d4732", "on-tertiary-fixed": "#002022", "tertiary-container": "#00f1ff", tertiary: "#00696f", "primary-container": "#ffd700", "on-tertiary": "#ffffff", "tertiary-fixed-dim": "#00dbe8",
            },
            borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
            fontFamily: { headline: ["Manrope"], body: ["Inter"], label: ["Inter"] },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
    </style>
  </head>
  <body class="bg-gradient-to-br from-[#F9F6E8] via-[#D4AF37] to-[#996515] min-h-screen text-slate-900 font-sans selection:bg-[#996515] selection:text-white">
    <nav class="bg-neutral-50/70 dark:bg-neutral-900/70 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-sm dark:shadow-none flex justify-between items-center w-full px-6 py-4 max-w-full font-manrope antialiased tracking-tight">
      <div class="flex items-center gap-8">
        <span class="text-xl font-black text-neutral-900 dark:text-white uppercase tracking-widest border-t-4 border-yellow-400 pt-1">Maybank SDB</span>
        <div class="hidden md:flex gap-6 items-center">
          <a class="text-yellow-700 dark:text-yellow-400 border-b-2 border-yellow-600 dark:border-yellow-400 pb-1 hover:text-yellow-600 transition-colors duration-300" href="dashboard.html">Beranda</a>
          <a class="text-neutral-500 dark:text-neutral-400 pb-1 hover:text-yellow-600 transition-colors duration-300" href="history.html">Riwayat</a>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-12 pb-32">
      <header class="mb-16">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
          <div class="space-y-2">
            <h1 class="text-5xl font-extrabold font-headline tracking-tighter text-on-surface">Beranda Antrian SDB</h1>
            <div class="flex items-center gap-2 text-primary font-medium">
              <span class="material-symbols-outlined text-sm">calendar_today</span>
              <span id="current-date" class="font-label text-sm uppercase tracking-widest"></span>
            </div>
          </div>
        </div>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <section class="lg:col-span-8 space-y-8">
          <div class="flex items-center justify-between">
            <h2 class="text-2xl font-bold font-headline tracking-tight">Pilih Slot Waktu</h2>
            <span id="slot-count" class="text-xs font-bold font-label uppercase tracking-widest text-on-surface-variant bg-surface-container-high px-3 py-1 rounded-full">8 Slot Tersedia</span>
          </div>
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
            <button data-time="08:00" class="group relative overflow-hidden bg-surface-container-lowest p-6 rounded-xl text-left transition-all duration-300 hover:scale-[1.02] hover:bg-primary-container active:scale-95 shadow-sm border border-outline-variant/10"><p class="text-sm font-label uppercase tracking-widest text-on-surface-variant">Pagi</p><p class="text-3xl font-headline font-black mt-2">08:00</p></button>
            <button data-time="09:00" class="group relative overflow-hidden bg-surface-container-lowest p-6 rounded-xl text-left transition-all duration-300 hover:scale-[1.02] hover:bg-primary-container active:scale-95 shadow-sm border border-outline-variant/10"><p class="text-sm font-label uppercase tracking-widest text-on-surface-variant">Pagi</p><p class="text-3xl font-headline font-black mt-2">09:00</p></button>
            <button data-time="10:00" class="group relative overflow-hidden bg-surface-container-lowest p-6 rounded-xl text-left transition-all duration-300 hover:scale-[1.02] hover:bg-primary-container active:scale-95 shadow-sm border border-outline-variant/10"><p class="text-sm font-label uppercase tracking-widest text-on-surface-variant">Pagi</p><p class="text-3xl font-headline font-black mt-2">10:00</p></button>
            <button data-time="11:00" class="group relative overflow-hidden bg-surface-container-lowest p-6 rounded-xl text-left transition-all duration-300 hover:scale-[1.02] hover:bg-primary-container active:scale-95 shadow-sm border border-outline-variant/10"><p class="text-sm font-label uppercase tracking-widest text-on-surface-variant">Siang</p><p class="text-3xl font-headline font-black mt-2">11:00</p></button>
            <button data-time="12:00" class="group relative overflow-hidden bg-surface-container-lowest p-6 rounded-xl text-left transition-all duration-300 hover:scale-[1.02] hover:bg-primary-container active:scale-95 shadow-sm border border-outline-variant/10"><p class="text-sm font-label uppercase tracking-widest text-on-surface-variant">Siang</p><p class="text-3xl font-headline font-black mt-2">12:00</p></button>
            <button data-time="13:00" class="group relative overflow-hidden bg-surface-container-lowest p-6 rounded-xl text-left transition-all duration-300 hover:scale-[1.02] hover:bg-primary-container active:scale-95 shadow-sm border border-outline-variant/10"><p class="text-sm font-label uppercase tracking-widest text-on-surface-variant">Siang</p><p class="text-3xl font-headline font-black mt-2">13:00</p></button>
            <button data-time="14:00" class="group relative overflow-hidden bg-surface-container-lowest p-6 rounded-xl text-left transition-all duration-300 hover:scale-[1.02] hover:bg-primary-container active:scale-95 shadow-sm border border-outline-variant/10"><p class="text-sm font-label uppercase tracking-widest text-on-surface-variant">Siang</p><p class="text-3xl font-headline font-black mt-2">14:00</p></button>
            <button data-time="15:00" class="group relative overflow-hidden bg-surface-container-lowest p-6 rounded-xl text-left transition-all duration-300 hover:scale-[1.02] hover:bg-primary-container active:scale-95 shadow-sm border border-outline-variant/10"><p class="text-sm font-label uppercase tracking-widest text-on-surface-variant">Sore</p><p class="text-3xl font-headline font-black mt-2">15:00</p></button>
          </div>
        </section>

        <aside class="lg:col-span-4">
          <div class="bg-surface-container-low rounded-3xl p-8 sticky top-32 border border-outline-variant/20 shadow-xl">
            <div class="mb-10 text-center">
              <h2 class="text-2xl font-bold font-headline text-on-surface">Detail Booking</h2>
              <p class="text-on-surface-variant text-sm mt-1">Konfirmasi kunjungan Anda</p>
            </div>
            <div class="space-y-8">
              <div class="bg-white rounded-2xl p-6 shadow-sm">
                <div class="flex items-center justify-between mb-4">
                  <span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Waktu Terpilih</span>
                </div>
                <div class="flex items-end gap-2">
                  <span id="selected-time" class="text-4xl font-headline font-black text-on-surface">-</span>
                  <span id="selected-date" class="text-on-surface-variant font-medium pb-1"></span>
                </div>
              </div>
              <form id="booking-form" class="space-y-6">
                <div class="space-y-2">
                  <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Nama Lengkap</label>
                  <input id="nama" class="w-full bg-surface-container-highest border-b-2 border-transparent focus:ring-0 focus:border-primary text-on-surface py-4 px-2 font-medium" placeholder="Masukkan nama sesuai ID" type="text" required />
                </div>
                <div class="space-y-2">
                  <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Nomor Telepon</label>
                  <input id="telepon" class="w-full bg-surface-container-highest border-b-2 border-transparent focus:ring-0 focus:border-primary text-on-surface py-4 px-2 font-medium" placeholder="+62 812 XXXX XXXX" type="tel" required />
                </div>
                <div class="pt-4 flex flex-col gap-4">
                  <button id="confirm-booking" class="w-full bg-primary-container text-on-primary-container py-5 rounded-xl font-bold font-headline text-lg hover:scale-[1.02] active:scale-95 transition-all shadow-lg" type="button">
                    Konfirmasi Booking
                  </button>
                  <button id="cancel-booking" type="button" class="text-neutral-500">Batalkan</button>
                </div>
              </form>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 bg-neutral-50/70 backdrop-blur-xl flex justify-around items-center px-8 pb-6 pt-3 shadow-lg">
      <a class="flex flex-col items-center justify-center bg-yellow-400 text-neutral-900 rounded-full px-6 py-2" href="dashboard.html"><span class="font-inter text-[10px] font-bold uppercase">Beranda</span></a>
      <a class="flex flex-col items-center justify-center text-neutral-500 px-4 py-2" href="history.html"><span class="font-inter text-[10px] font-bold uppercase">Riwayat</span></a>
    </nav>

    <script src="script.js"></script>
  </body>
</html>
